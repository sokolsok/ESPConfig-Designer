services:
  esp-config-designer:
    image: ghcr.io/sokolsok/esp-config-designer:latest
    container_name: esp-config-designer
    restart: unless-stopped

    ports:
      - "${ECD_PORT:-8099}:${ECD_PORT:-8099}"

    environment:
      TZ: ${TZ:-Europe/Warsaw}
      ECD_MODE: standalone
      ECD_PORT: ${ECD_PORT:-8099}
      ECD_USE_ESPHOME_SHARED_PATH: ${ECD_USE_ESPHOME_SHARED_PATH:-false}
      ECD_STATUS_USE_PING: "true"
      ECD_AUTH_MODE: ${ECD_AUTH_MODE:-basic}
      ECD_AUTH_USERNAME: ${ECD_AUTH_USERNAME:-admin}
      ECD_AUTH_PASSWORD: ${ECD_AUTH_PASSWORD:-change-me}

    volumes:
      - ./config:/config
      - ./data:/data
      - ./build:/build
      - /etc/localtime:/etc/localtime:ro

    # Required for the "Serial port (HA Server)" install mode.
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyACM0:/dev/ttyACM0
