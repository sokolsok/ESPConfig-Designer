name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend test dependencies
        run: python -m pip install --upgrade pip flask==3.1.2

      - name: Check release version metadata
        run: python scripts/check-release-version.py

      - name: Run backend tests
        run: python -m unittest discover -s esp-config-designer/tests

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build standalone Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./esp-config-designer
          file: ./esp-config-designer/Dockerfile.standalone
          platforms: linux/amd64
          push: false
          build-args: |
            BUILD_VERSION=ci
            VCS_REF=${{ github.sha }}
